# MinIO on-premise S3-compatible storage untuk berkas sensitif SIMPEL DINSOS
#
# Jalankan:
#   cd infra && docker compose -f docker-compose.minio.yml up -d
#
# Setelah jalan:
#   - Console UI : http://localhost:9001 (user/pass dari env)
#   - S3 API     : http://localhost:9000
#
# Buat bucket "simpel-dinsos" via console, lalu update .env:
#   SECURE_DISK_DRIVER=minio
#   MINIO_KEY=...
#   MINIO_SECRET=...
#   MINIO_BUCKET=simpel-dinsos
#   MINIO_ENDPOINT=http://127.0.0.1:9000
#
# Lalu pindahkan berkas lama dari local ke MinIO:
#   php artisan storage:migrate-sensitive

services:
  minio:
    image: minio/minio:RELEASE.2024-10-29T16-01-48Z
    container_name: simpel-dinsos-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio-pringsewu-2026}
      MINIO_REGION: us-east-1
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # mc (MinIO Client) untuk auto-create bucket saat startup
  minio-init:
    image: minio/mc:RELEASE.2024-10-29T15-34-59Z
    container_name: simpel-dinsos-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minio-pringsewu-2026};
      mc mb --ignore-existing local/simpel-dinsos;
      mc anonymous set none local/simpel-dinsos;
      echo 'Bucket simpel-dinsos siap (private).';
      exit 0;
      "

volumes:
  minio-data:
    driver: local
