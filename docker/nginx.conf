user app;
worker_processes auto;
pid /run/nginx/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Penting di Railway: respect X-Forwarded-Proto dari Railway edge
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    # Logging
    log_format railway '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent"';
    access_log /dev/stdout railway;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Upload berkas KTP/KK + PDF surat — sesuaikan jika perlu lebih besar
    client_max_body_size 20M;
    client_body_timeout 60s;

    server {
        # Railway inject $PORT — di-substitusi oleh entrypoint
        listen 8080 default_server;
        listen [::]:8080 default_server;
        server_name _;

        root /app/public;
        index index.php;

        charset utf-8;

        # Filament & Livewire assets ada di public/vendor + public/livewire
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # PWA service worker — JANGAN cache di browser
        location = /sw.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Service-Worker-Allowed "/";
            try_files $uri =404;
        }

        # PWA manifest — cache pendek
        location = /manifest.webmanifest {
            add_header Cache-Control "max-age=3600";
            try_files $uri =404;
        }

        # Livewire endpoint — JANGAN treat sebagai static asset!
        # /livewire/livewire.min.js + /livewire/update di-serve dynamic oleh Laravel.
        location ^~ /livewire/ {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Static assets — cache panjang (Vite hash di filename).
        # Pakai prefix exclude /livewire/ sudah dihandle di atas (^~ lebih prioritas).
        location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|webp|svg|woff2?|ttf|otf|eot|map)$ {
            expires 1y;
            access_log off;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Storage symlink (untuk surat keluar PDF + asset public)
        location /storage/ {
            try_files $uri =404;
        }

        # Block akses ke file sensitif
        location ~ /\.(?!well-known) {
            deny all;
        }
        location ~ /(?:storage/app/secure|storage/app/private|\.env|composer\.(?:json|lock)) {
            deny all;
            return 404;
        }

        location = /favicon.ico {
            access_log off;
            log_not_found off;
        }

        location = /robots.txt {
            access_log off;
            log_not_found off;
        }

        # Filament & livewire endpoint
        error_page 404 /index.php;

        # PHP-FPM
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass unix:/var/run/php/php-fpm.sock;
            fastcgi_index index.php;
            include fastcgi_params;

            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT $realpath_root;
            fastcgi_param HTTPS $http_x_forwarded_proto if_not_empty;

            # Filament long-running action (PDF generation, dst)
            fastcgi_read_timeout 120s;
            fastcgi_buffers 16 16k;
            fastcgi_buffer_size 32k;
        }
    }
}
