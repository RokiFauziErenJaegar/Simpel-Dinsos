[www]
user = app
group = app

; Listen via unix socket — lebih cepat dari TCP untuk komunikasi nginx ↔ php-fpm
listen = /var/run/php/php-fpm.sock
listen.owner = app
listen.group = app
listen.mode = 0660

; Process management — sesuaikan kalau Railway plan punya RAM lebih
pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests = 500

; Log ke stderr agar muncul di Railway logs
catch_workers_output = yes
decorate_workers_output = no
access.log = /dev/stdout
php_admin_value[error_log] = /dev/stderr
php_admin_flag[log_errors] = on
clear_env = no
