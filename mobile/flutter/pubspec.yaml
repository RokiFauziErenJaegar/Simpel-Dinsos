name: simpel_dinsos_mobile
description: SIMPEL DINSOS Mobile — Layanan Sosial Kabupaten Pringsewu
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # HTTP & state
  dio: ^5.4.0
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # Routing
  go_router: ^14.0.0

  # Secure storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0

  # UI
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  qr_flutter: ^4.1.0
  intl: ^0.19.0

  # Utility
  url_launcher: ^6.2.0
  share_plus: ^7.2.0
  flutter_local_notifications: ^16.0.0

  # Forms
  flutter_form_builder: ^9.2.0
  form_builder_validators: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans-ExtraBold.ttf
          weight: 800
